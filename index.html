<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kritik & Saran — District Country</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #e94560;
    --red-dark: #c73652;
    --bg-dark: #0a0a14;
    --bg-card: #12121f;
    --bg-card2: #1a1a2e;
    --bg-input: #0f0f1c;
    --border: rgba(255,255,255,0.08);
    --border-red: rgba(233,69,96,0.35);
    --text: #f0f0f5;
    --text-muted: #888;
    --text-dim: #555;
    --success: #1d9e75;
    --font-heading: 'Rajdhani', sans-serif;
    --font-body: 'Inter', sans-serif;
  }
  html, body { height: 100%; }
  body { font-family: var(--font-body); background: var(--bg-dark); color: var(--text); min-height: 100vh; }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg-dark); }
  ::-webkit-scrollbar-thumb { background: var(--border-red); border-radius: 10px; }

  /* ===== UTILITY ===== */
  .hidden { display: none !important; }
  .badge-admin { background: rgba(233,69,96,0.18); color: var(--red); font-size: 11px; padding: 2px 10px; border-radius: 20px; border: 1px solid var(--border-red); font-weight: 500; letter-spacing: 0.5px; }
  .badge-online { background: rgba(29,158,117,0.18); color: #1d9e75; font-size: 11px; padding: 2px 10px; border-radius: 20px; border: 1px solid rgba(29,158,117,0.3); }

  /* ===== LOGIN PAGE ===== */
  #loginPage {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(233,69,96,0.12) 0%, transparent 70%),
                linear-gradient(180deg, #0a0a14 0%, #0f0f1c 100%);
    padding: 20px;
  }
  .login-wrap { width: 100%; max-width: 420px; }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo .logo-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 64px; height: 64px; border-radius: 18px;
    background: linear-gradient(135deg, rgba(233,69,96,0.3), rgba(233,69,96,0.08));
    border: 1px solid var(--border-red); margin-bottom: 16px;
  }
  .login-logo .logo-badge i { font-size: 32px; color: var(--red); }
  .login-logo h1 { font-family: var(--font-heading); font-size: 24px; font-weight: 700; color: #fff; letter-spacing: 2px; line-height: 1.2; }
  .login-logo p { color: var(--text-muted); font-size: 13px; margin-top: 6px; }
  .login-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 20px; padding: 28px; position: relative; overflow: hidden;
  }
  .login-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
  }
  .tab-row { display: flex; gap: 6px; background: var(--bg-input); border-radius: 10px; padding: 4px; margin-bottom: 24px; }
  .tab-btn {
    flex: 1; padding: 9px; border-radius: 8px; font-size: 13px; font-weight: 500;
    cursor: pointer; border: none; background: transparent; color: var(--text-muted); transition: all 0.2s;
    font-family: var(--font-body);
  }
  .tab-btn.active { background: var(--red); color: #fff; }
  .form-field { margin-bottom: 14px; }
  .form-field label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.3px; }
  .form-field input {
    width: 100%; padding: 11px 14px; border-radius: 10px; font-size: 14px;
    background: var(--bg-input); border: 1px solid var(--border); color: var(--text);
    outline: none; transition: border-color 0.2s; font-family: var(--font-body);
  }
  .form-field input:focus { border-color: var(--red); }
  .form-field input::placeholder { color: var(--text-dim); }
  .btn-primary {
    width: 100%; padding: 13px; background: var(--red); color: #fff;
    border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; font-family: var(--font-body);
    letter-spacing: 0.5px; margin-top: 4px;
  }
  .btn-primary:hover { background: var(--red-dark); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .err { color: #f09595; font-size: 12px; text-align: center; min-height: 20px; margin-top: 10px; }

  /* ===== MAIN APP ===== */
  #mainApp { display: flex; flex-direction: column; min-height: 100vh; }

  /* TOP BAR */
  .topbar {
    background: var(--bg-card); border-bottom: 1px solid var(--border);
    padding: 0 20px; height: 56px; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-logo { font-family: var(--font-heading); font-size: 18px; font-weight: 700; color: var(--red); letter-spacing: 1px; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .topbar-user { font-size: 13px; color: var(--text-muted); }
  .btn-logout {
    background: transparent; border: 1px solid var(--border); color: var(--text-muted);
    padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; transition: all 0.2s;
    font-family: var(--font-body);
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* NAV */
  .navbar {
    background: var(--bg-card2); border-bottom: 1px solid var(--border);
    display: flex; overflow-x: auto; padding: 0 16px;
  }
  .navbar::-webkit-scrollbar { height: 0; }
  .nav-item {
    padding: 14px 18px; color: var(--text-muted); font-size: 13px; font-weight: 500;
    cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap;
    display: flex; align-items: center; gap: 7px; transition: all 0.2s;
  }
  .nav-item:hover { color: var(--text); }
  .nav-item.active { color: var(--red); border-bottom-color: var(--red); }
  .nav-item i { font-size: 16px; }

  /* CONTENT */
  .content { flex: 1; padding: 24px 20px; max-width: 900px; margin: 0 auto; width: 100%; }

  /* BERANDA */
  .section-title { font-size: 13px; font-weight: 600; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .admin-toolbar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .btn-tool {
    display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
    border-radius: 9px; font-size: 13px; font-weight: 500; cursor: pointer; border: none;
    transition: all 0.2s; font-family: var(--font-body);
  }
  .btn-tool.red { background: var(--red); color: #fff; }
  .btn-tool.red:hover { background: var(--red-dark); }
  .btn-tool.dark { background: var(--bg-card2); color: var(--text); border: 1px solid var(--border); }
  .btn-tool.dark:hover { border-color: var(--red); }

  /* MEDIA GRID */
  .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; margin-bottom: 32px; }
  .media-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: border-color 0.2s; }
  .media-card:hover { border-color: var(--border-red); }
  .media-thumb {
    height: 140px; background: linear-gradient(135deg, #0f0f1c, #1a1a2e);
    display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer;
  }
  .media-type-badge {
    position: absolute; top: 10px; left: 10px;
    background: rgba(0,0,0,0.6); color: var(--text-muted); font-size: 10px;
    padding: 3px 8px; border-radius: 6px; backdrop-filter: blur(4px);
  }
  .play-circle {
    width: 48px; height: 48px; border-radius: 50%;
    background: rgba(233,69,96,0.9); display: flex; align-items: center; justify-content: center;
  }
  .play-circle i { font-size: 22px; color: #fff; margin-left: 3px; }
  .photo-icon { font-size: 40px; color: rgba(233,69,96,0.5); }
  .media-body { padding: 12px 14px; }
  .media-body strong { font-size: 14px; font-weight: 600; color: var(--text); display: block; margin-bottom: 4px; }
  .media-body p { font-size: 12px; color: var(--text-muted); line-height: 1.5; }
  .media-body .meta { font-size: 11px; color: var(--text-dim); margin-top: 8px; display: flex; align-items: center; justify-content: space-between; }
  .btn-hapus { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-size: 12px; transition: color 0.2s; }
  .btn-hapus:hover { color: var(--red); }
  .btn-hapus i { font-size: 14px; }

  /* PENGUMUMAN */
  .peng-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-left: 3px solid var(--red); border-radius: 0 12px 12px 0;
    padding: 14px 16px; margin-bottom: 10px; transition: border-color 0.2s;
  }
  .peng-card:hover { border-color: var(--border-red); border-left-color: var(--red); }
  .peng-card .peng-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 6px; }
  .peng-card .peng-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .peng-card .peng-date { font-size: 11px; color: var(--text-dim); }
  .peng-card .peng-isi { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

  /* KRITIK / SARAN */
  .form-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 24px; }
  .form-card h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
  .form-card textarea {
    width: 100%; padding: 11px 14px; border-radius: 10px; font-size: 13px; min-height: 90px;
    background: var(--bg-input); border: 1px solid var(--border); color: var(--text);
    resize: vertical; outline: none; font-family: var(--font-body); line-height: 1.6;
    transition: border-color 0.2s;
  }
  .form-card textarea:focus { border-color: var(--red); }
  .form-card textarea::placeholder { color: var(--text-dim); }
  .btn-kirim {
    margin-top: 10px; padding: 9px 20px; background: var(--red); color: #fff;
    border: none; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer;
    transition: background 0.2s; font-family: var(--font-body);
  }
  .btn-kirim:hover { background: var(--red-dark); }

  /* ULASAN CARD */
  .ulasan-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; transition: border-color 0.2s; }
  .ulasan-card:hover { border-color: rgba(255,255,255,0.12); }
  .ulasan-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
  .ulasan-user { display: flex; align-items: center; gap: 10px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
    background: rgba(233,69,96,0.15); border: 1px solid var(--border-red);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600; color: var(--red);
  }
  .u-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .u-ucp { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .u-date { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  .ulasan-body { font-size: 13px; color: var(--text-muted); line-height: 1.7; margin-bottom: 12px; }
  .balasan-box { background: rgba(233,69,96,0.06); border-left: 2px solid var(--red); border-radius: 0 10px 10px 0; padding: 10px 14px; margin-bottom: 10px; }
  .balasan-label { font-size: 11px; color: var(--red); font-weight: 600; letter-spacing: 0.5px; margin-bottom: 5px; display: flex; align-items: center; gap: 5px; }
  .balasan-text { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
  .ulasan-actions { display: flex; align-items: center; gap: 8px; }
  .btn-balas {
    display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px;
    background: transparent; border: 1px solid var(--border-red); color: var(--red);
    border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s;
    font-family: var(--font-body);
  }
  .btn-balas:hover { background: rgba(233,69,96,0.1); }
  .balas-form { margin-top: 12px; }
  .balas-form textarea {
    width: 100%; padding: 10px 12px; border-radius: 9px; font-size: 13px; height: 70px;
    background: var(--bg-input); border: 1px solid var(--border); color: var(--text);
    resize: none; outline: none; font-family: var(--font-body); transition: border-color 0.2s;
  }
  .balas-form textarea:focus { border-color: var(--red); }
  .btn-send { margin-top: 6px; padding: 7px 16px; background: var(--red); color: #fff; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font-body); }
  .empty { text-align: center; padding: 48px 20px; }
  .empty i { font-size: 40px; color: var(--text-dim); display: block; margin-bottom: 10px; }
  .empty p { font-size: 13px; color: var(--text-dim); }

  /* MODAL */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 20px; backdrop-filter: blur(4px); }
  .modal {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px;
    padding: 26px; width: 100%; max-width: 440px; position: relative;
  }
  .modal::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--red), transparent); border-radius: 18px 18px 0 0; }
  .modal h3 { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
  .modal h3 i { color: var(--red); font-size: 18px; }
  .modal label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
  .modal input, .modal textarea, .modal select {
    width: 100%; padding: 10px 13px; border-radius: 9px; font-size: 13px;
    background: var(--bg-input); border: 1px solid var(--border); color: var(--text);
    outline: none; margin-bottom: 12px; font-family: var(--font-body); transition: border-color 0.2s;
  }
  .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--red); }
  .modal select option { background: var(--bg-card); }
  .modal textarea { height: 90px; resize: vertical; }
  .modal-actions { display: flex; gap: 8px; margin-top: 4px; }
  .btn-ok { flex: 1; padding: 11px; background: var(--red); color: #fff; border: none; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font-body); }
  .btn-ok:hover { background: var(--red-dark); }
  .btn-cancel { flex: 1; padding: 11px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); border-radius: 9px; font-size: 13px; cursor: pointer; font-family: var(--font-body); }
  .btn-cancel:hover { border-color: var(--text-dim); }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--bg-card2); border: 1px solid var(--border); color: var(--text);
    padding: 12px 22px; border-radius: 12px; font-size: 13px; z-index: 9999;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space: nowrap;
    display: flex; align-items: center; gap: 8px;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast i { color: var(--success); font-size: 16px; }

  @media (max-width: 600px) {
    .content { padding: 16px; }
    .media-grid { grid-template-columns: 1fr 1fr; }
    .topbar-logo { font-size: 15px; }
    .topbar-user { display: none; }
  }
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-badge"><i class="ti ti-shield-star"></i></div>
      <h1>DISTRICT COUNTRY</h1>
      <p>Portal Kritik &amp; Saran Server</p>
    </div>
    <div class="login-card">
      <div class="tab-row">
        <button class="tab-btn active" id="tabPlayer" onclick="switchTab('player')">
          <i class="ti ti-user" style="font-size:13px;"></i> Login Player
        </button>
        <button class="tab-btn" id="tabAdmin" onclick="switchTab('admin')">
          <i class="ti ti-shield" style="font-size:13px;"></i> Login Admin
        </button>
      </div>
      <div id="playerForm">
        <div class="form-field">
          <label>Nama IC (In Character)</label>
          <input type="text" id="namaIC" placeholder="Contoh: Budi Santoso" autocomplete="off"/>
        </div>
        <div class="form-field">
          <label>Username UCP</label>
          <input type="text" id="namaUCP" placeholder="Contoh: budi_123" autocomplete="off"/>
        </div>
        <button class="btn-primary" onclick="loginPlayer()">
          <i class="ti ti-login" style="font-size:14px;"></i> MASUK
        </button>
      </div>
      <div id="adminForm" class="hidden">
        <div class="form-field">
          <label>Username Admin</label>
          <input type="text" id="adminUser" placeholder="Username" autocomplete="off"/>
        </div>
        <div class="form-field">
          <label>Password</label>
          <input type="password" id="adminPass" placeholder="••••••••"/>
        </div>
        <button class="btn-primary" onclick="loginAdmin()">
          <i class="ti ti-shield-lock" style="font-size:14px;"></i> LOGIN ADMIN
        </button>
      </div>
      <div class="err" id="errMsg"></div>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*,video/*" hidden>
 
<!-- MAIN APP -->
<div id="mainApp" class="hidden">
  <div class="topbar">
    <div class="topbar-left">
      <i class="ti ti-shield-star" style="color:var(--red);font-size:20px;"></i>
      <span class="topbar-logo">DISTRICT COUNTRY</span>
      <span class="badge-online" id="badgeRole"></span>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="userLabel"></span>
      <button class="btn-logout" onclick="logout()">
        <i class="ti ti-logout" style="font-size:13px;"></i> Keluar
      </button>
    </div>
  </div>
  <div class="navbar">
    <div class="nav-item active" id="nav-beranda" onclick="showPage('beranda')">
      <i class="ti ti-home"></i> Beranda
    </div>
    <div class="nav-item" id="nav-kritik" onclick="showPage('kritik')">
      <i class="ti ti-message-report"></i> Kritik
    </div>
    <div class="nav-item" id="nav-saran" onclick="showPage('saran')">
      <i class="ti ti-bulb"></i> Saran
    </div>
  </div>
  <div class="content">

    <!-- BERANDA -->
    <div id="page-beranda">
      <div id="toolbarBeranda" class="admin-toolbar hidden">
        <button class="btn-tool red" onclick="openModal('modalMedia')">
          <i class="ti ti-photo-plus"></i> Tambah Konten
        </button>
        <button class="btn-tool dark" onclick="openModal('modalPengumuman')">
          <i class="ti ti-speakerphone"></i> Tambah Pengumuman
        </button>
      </div>
      <div class="section-title">Konten Terbaru</div>
      <div class="media-grid" id="mediaGrid"></div>
      <div class="section-title">Pengumuman</div>
      <div id="pengumumanList"></div>
    </div>

    <!-- KRITIK -->
    <div id="page-kritik" class="hidden">
      <div class="form-card" id="formKritikBox">
        <h3><i class="ti ti-pencil" style="color:var(--red);"></i> Tulis Kritikmu</h3>
        <textarea id="isiKritik" placeholder="Ceritakan kritikmu tentang server District Country..."></textarea>
        <button class="btn-kirim" onclick="kirimKritik()">
          <i class="ti ti-send"></i> Kirim Kritik
        </button>
      </div>
      <div class="section-title">Semua Kritik</div>
      <div id="listKritik"></div>
    </div>

    <!-- SARAN -->
    <div id="page-saran" class="hidden">
      <div class="form-card" id="formSaranBox">
        <h3><i class="ti ti-bulb" style="color:var(--red);"></i> Berikan Saranmu</h3>
        <textarea id="isiSaran" placeholder="Tuliskan saran atau ide update yang ingin kamu usulkan..."></textarea>
        <button class="btn-kirim" onclick="kirimSaran()">
          <i class="ti ti-send"></i> Kirim Saran
        </button>
      </div>
      <div class="section-title">Semua Saran</div>
      <div id="listSaran"></div>
    </div>

  </div>
</div>

<!-- MODAL MEDIA -->
<div class="overlay hidden" id="modalMedia">
  <div class="modal">
    <h3><i class="ti ti-photo-plus"></i> Tambah Konten Media</h3>
    <label>Judul Konten</label>
    <input type="text" id="mJudul" placeholder="Contoh: Update Peta Season 6"/>
    <label>Tipe Konten</label>
    <select id="mTipe">
      <option value="foto">📷 Foto</option>
      <option value="video">🎬 Video</option>
    </select>
    <label>Deskripsi</label>
    <textarea id="mDesc" placeholder="Deskripsi singkat konten..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modalMedia')">Batal</button>
      <button class="btn-ok" onclick="simpanMedia()">Simpan</button>
    </div>
  </div>
</div>

<!-- MODAL PENGUMUMAN -->
<div class="overlay hidden" id="modalPengumuman">
  <div class="modal">
    <h3><i class="ti ti-speakerphone"></i> Tambah Pengumuman</h3>
    <label>Judul Pengumuman</label>

// ============ STATE ============
let S = { user: null, isAdmin: false };

// ============ UTILS ============
let toastTimer;
function toast(msg) {
  document.getElementById('toastMsg').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}
function uid() { return Date.now() + Math.floor(Math.random()*1000); }
function hari() {
  const d = new Date();
  const bln = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];
  return d.getDate() + ' ' + bln[d.getMonth()] + ' ' + d.getFullYear();
}
function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============ LOGIN ============
function switchTab(tab) {
  document.getElementById('tabPlayer').classList.toggle('active', tab==='player');
  document.getElementById('tabAdmin').classList.toggle('active', tab==='admin');
  document.getElementById('playerForm').classList.toggle('hidden', tab!=='player');
  document.getElementById('adminForm').classList.toggle('hidden', tab!=='admin');
  document.getElementById('errMsg').textContent = '';
}

function loginPlayer() {
  const ic = document.getElementById('namaIC').value.trim();
  const ucp = document.getElementById('namaUCP').value.trim();
  if (!ic) { showErr('Nama IC tidak boleh kosong!'); return; }
  if (!ucp) { showErr('Username UCP tidak boleh kosong!'); return; }
  S.user = { namaIC: ic, ucp: ucp };
  S.isAdmin = false;
  enterApp();
}

function loginAdmin() {
  const u = document.getElementById('adminUser').value.trim();
  const p = document.getElementById('adminPass').value;
  if (u === 'bombon' && p === 'bombon1342') {
    S.user = { namaIC: 'ADMIN', ucp: 'bombon' };
    S.isAdmin = true;
    enterApp();
  } else {
    showErr('Username atau password salah!');
  }
}

function showErr(msg) { document.getElementById('errMsg').textContent = msg; }

function enterApp() {
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('userLabel').textContent = S.isAdmin ? 'bombon' : `${S.user.namaIC} | ${S.user.ucp}`;
  document.getElementById('badgeRole').textContent = S.isAdmin ? '👑 Admin' : '🟢 Player';
  document.getElementById('toolbarBeranda').classList.toggle('hidden', !S.isAdmin);
  document.getElementById('formKritikBox').classList.toggle('hidden', S.isAdmin);
  document.getElementById('formSaranBox').classList.toggle('hidden', S.isAdmin);
  showPage('beranda');
  renderAll();
}

function logout() {
  S.user = null; S.isAdmin = false;
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
  ['namaIC','namaUCP','adminUser','adminPass'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('errMsg').textContent = '';
  switchTab('player');
}

// ============ NAVIGATION ============
function showPage(p) {
  ['beranda','kritik','saran'].forEach(n => {
    document.getElementById('page-'+n).classList.toggle('hidden', n!==p);
    document.getElementById('nav-'+n).classList.toggle('active', n===p);
  });
}

// ============ RENDER ============
function renderAll() { renderMedia(); renderPengumuman(); renderKritik(); renderSaran(); }

function renderMedia() {
  const data = DB.get('media');
  const el = document.getElementById('mediaGrid');
  if (!data.length) {
    el.innerHTML = '<div class="empty"><i class="ti ti-photo-off"></i><p>Belum ada konten media.</p></div>';
    return;
  }
  el.innerHTML = data.map(m => `
    <div class="media-card">
      <div class="media-thumb">
        <span class="media-type-badge">${m.tipe.toUpperCase()}</span>
        ${m.tipe==='video'
          ? '<div class="play-circle"><i class="ti ti-player-play"></i></div>'
          : '<i class="ti ti-photo photo-icon"></i>'}
      </div>
      <div class="media-body">
        <strong>${esc(m.judul)}</strong>
        <p>${esc(m.desc)}</p>
        <div class="meta">
          <span>${m.tanggal}</span>
          ${S.isAdmin ? `<button class="btn-hapus" onclick="hapusMedia(${m.id})"><i class="ti ti-trash"></i> Hapus</button>` : ''}
        </div>
      </div>
    </div>`).join('');
}

function renderPengumuman() {
  const data = DB.get('pengumuman');
  const el = document.getElementById('pengumumanList');
  if (!data.length) {
    el.innerHTML = '<div class="empty"><i class="ti ti-speakerphone-off"></i><p>Belum ada pengumuman.</p></div>';
    return;
  }
  el.innerHTML = data.map(p => `
    <div class="peng-card">
      <div class="peng-top">
        <span class="peng-title"><i class="ti ti-speakerphone" style="color:var(--red);font-size:13px;"></i> ${esc(p.judul)}</span>
        <span class="peng-date">${p.tanggal}</span>
      </div>
      <div class="peng-isi">${esc(p.isi)}</div>
      ${S.isAdmin ? `<button class="btn-hapus" style="margin-top:8px;" onclick="hapusPengumuman(${p.id})"><i class="ti ti-trash"></i> Hapus</button>` : ''}
    </div>`).join('');
}

  const data = DB.get('kritik');

  if (!data.length) {
    el.innerHTML = '<div class="empty"><i class="ti ti-messages-off"></i><p>Belum ada kritik yang masuk.</p></div>';
    return;
  }
  el.innerHTML = data.map(k => `
    <div class="ulasan-card" id="kcard${k.id}">
      <div class="ulasan-header">

// ============ ACTIONS ============
async function kirimKritik() {
  const isi = document.getElementById('isiKritik').value.trim();
  if (!isi) return;

  const { error } = await supabase
    .from('kritik')
    .insert({
      namaic: S.user.namaIC,
      ucp: S.user.ucp,
      isi: isi,
      tanggal: hari(),
      balasan: ''
    });

  if (error) {
    alert(error.message);
    return;
  }

  document.getElementById('isiKritik').value = '';
  toast('Kritik berhasil dikirim!');
 }

function kirimSaran() {
  const isi = document.getElementById('isiSaran').value.trim();
  if (!isi) return;
  const data = DB.get('saran');
  data.unshift({ id:uid(), namaIC:S.user.namaIC, ucp:S.user.ucp, isi, tanggal:hari(), balasan:'' });
  DB.set('saran', data);
  document.getElementById('isiSaran').value = '';
  renderSaran();
  toast('Saran berhasil dikirim!');
}

function toggleBalas(type, id) {
  const el = document.getElementById(`bform_${type}${id}`);
  el.classList.toggle('hidden');
}

function simpanBalas(type, id) {
  const ta = document.querySelector(`#bform_${type}${id} textarea`);
  const txt = ta.value.trim();
  if (!txt) return;
  const key = type==='k' ? 'kritik' : 'saran';
  const data = DB.get(key);
  const item = data.find(x => x.id===id);
  if (item) item.balasan = txt;
  DB.set(key, data);
  type==='k' ? renderKritik() : renderSaran();
  toast('Balasan berhasil dikirim!');
}

function hapusMedia(id) {
  if (!confirm('Hapus konten ini?')) return;
  DB.set('media', DB.get('media').filter(x=>x.id!==id));
  renderMedia(); toast('Konten dihapus.');
}
function hapusPengumuman(id) {
  if (!confirm('Hapus pengumuman ini?')) return;
  DB.set('pengumuman', DB.get('pengumuman').filter(x=>x.id!==id));
  renderPengumuman(); toast('Pengumuman dihapus.');
}
function hapusKritik(id) {
  if (!confirm('Hapus kritik ini?')) return;
  DB.set('kritik', DB.get('kritik').filter(x=>x.id!==id));
  renderKritik(); toast('Kritik dihapus.');
}
function hapusSaran(id) {
  if (!confirm('Hapus saran ini?')) return;
  DB.set('saran', DB.get('saran').filter(x=>x.id!==id));
  renderSaran(); toast('Saran dihapus.');
}

// ============ MODAL ============
function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

function simpanMedia() {
  const judul = document.getElementById('mJudul').value.trim();
  const tipe = document.getElementById('mTipe').value;
  const desc = document.getElementById('mDesc').value.trim();
  if (!judul) { alert('Judul tidak boleh kosong!'); return; }
  const data = DB.get('media');
  data.unshift({ id:uid(), judul, tipe, desc, tanggal:hari() });
  DB.set('media', data);
  document.getElementById('mJudul').value = '';
  document.getElementById('mDesc').value = '';
  closeModal('modalMedia');
  renderMedia();
  toast('Konten berhasil ditambahkan!');
}

function simpanPengumuman() {
  const judul = document.getElementById('pJudul').value.trim();
  const isi = document.getElementById('pIsi').value.trim();
  if (!judul || !isi) { alert('Judul dan isi tidak boleh kosong!'); return; }
  const data = DB.get('pengumuman');
  data.unshift({ id:uid(), judul, isi, tanggal:hari() });
  DB.set('pengumuman', data);
  document.getElementById('pJudul').value = '';
  document.getElementById('pIsi').value = '';
  closeModal('modalPengumuman');
  renderPengumuman();
  toast('Pengumuman berhasil ditambahkan!');
}

// Tutup modal kalau klik overlay
document.querySelectorAll('.overlay').forEach(ov => {
  ov.addEventListener('click', e => { if (e.target===ov) ov.classList.add('hidden'); });
});

// Enter key on login
document.addEventListener('keydown', e => {
  if (e.key==='Enter') {
    const ap = document.getElementById('adminForm');

    else loginPlayer();
  }
});
